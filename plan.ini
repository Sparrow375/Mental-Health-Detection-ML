## рҹ“Ҡ DATA SCHEMAS

### Local SQLite Schema (Room Database)

```sql
-- Raw daily feature data
TABLE daily_features (
    id              INTEGER PRIMARY KEY,
    user_id         TEXT,
    date            TEXT,        -- "2025-01-15"
    feature_1       REAL,        -- e.g., screen_time
    feature_2       REAL,        -- e.g., calls_made
    ...
    feature_18      REAL,
    synced_to_cloud BOOLEAN DEFAULT FALSE,
    created_at      TIMESTAMP
)

-- Baseline data
TABLE baseline (
    id              INTEGER PRIMARY KEY,
    user_id         TEXT,
    feature_name    TEXT,
    baseline_value  REAL,
    std_deviation   REAL,
    baseline_start  TEXT,
    baseline_end    TEXT,
    is_contaminated BOOLEAN,
    updated_at      TIMESTAMP
)

-- Analysis results
TABLE analysis_results (
    id              INTEGER PRIMARY KEY,
    user_id         TEXT,
    date            TEXT,
    anomaly_detected BOOLEAN,
    anomaly_message TEXT,        -- The sentence output
    sustained_days  INTEGER,
    prototype_match TEXT,        -- "Depression", "BPD", etc.
    match_message   TEXT,        -- The sentence output
    gate_results    TEXT,        -- JSON string of gate outcomes
    synced_to_cloud BOOLEAN DEFAULT FALSE,
    created_at      TIMESTAMP
)

-- User profile
TABLE user_profile (
    user_id         TEXT PRIMARY KEY,
    onboarding_date TEXT,
    baseline_ready  BOOLEAN DEFAULT FALSE,
    baseline_days   INTEGER DEFAULT 28,
    current_status  TEXT         -- "Normal", "Monitoring", "Flagged"
)
```

