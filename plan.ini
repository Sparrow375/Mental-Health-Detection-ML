## рҹҗҚ CHAQUOPY INTEGRATION PLAN

### How It Works

```
в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ         в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ
в”Ӯ   Kotlin     в”Ӯ  calls  в”Ӯ   Python Engine   в”Ӯ
в”Ӯ   (Android)  в”Ӯв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв–¶в”Ӯ   (Chaquopy)      в”Ӯ
в”Ӯ              в”Ӯ         в”Ӯ                   в”Ӯ
в”Ӯ  1. Reads    в”Ӯ         в”Ӯ  1. Receives JSON в”Ӯ
в”Ӯ     SQLite   в”Ӯ         в”Ӯ  2. Runs Stage 1  в”Ӯ
в”Ӯ  2. Converts в”Ӯ         в”Ӯ     (Anomaly)     в”Ӯ
в”Ӯ     to JSON  в”Ӯ         в”Ӯ  3. Runs Stage 2  в”Ӯ
в”Ӯ  3. Passes   в”Ӯ         в”Ӯ     (Prototype)   в”Ӯ
в”Ӯ     to Pythonв”Ӯ         в”Ӯ  4. Returns       в”Ӯ
в”Ӯ              в”Ӯв—Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Ӯ     result string в”Ӯ
в”Ӯ  4. Stores   в”Ӯ returns в”Ӯ                   в”Ӯ
в”Ӯ     results  в”Ӯ         в”Ӯ                   в”Ӯ
в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ         в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ
```

### Setup Steps

**Step 1: Add Chaquopy to your project**
```groovy
// build.gradle (project level)
plugins {
    id 'com.chaquo.python' version '15.0.1'
}

// build.gradle (app level)
android {
    defaultConfig {
        python {
            version "3.11"
        }
    }
}

chaquopy {
    defaultConfig {
        // No pip packages needed since pure logic!
    }
}
```

**Step 2: Place your Python files**
```
app/
  src/
    main/
      python/
        в”ңв”Җв”Җ engine.py           -- Main entry point
        в”ңв”Җв”Җ anomaly_detector.py -- Stage 1
        в”ңв”Җв”Җ prototype_matcher.py -- Stage 2
        в””в”Җв”Җ baseline_screener.py -- 3-Gate system
```

**Step 3: Call from Kotlin**
```kotlin
// In your nightly WorkManager task
val python = Python.getInstance()
val engine = python.getModule("engine")

// Convert today's data to JSON string
val inputJson = convertDailyDataToJson(userId, date)

// Call Python
val result = engine.callAttr("run_analysis", inputJson).toString()

// Parse and store result
storeAnalysisResult(userId, date, result)
```

**Step 4: Python entry point**
```python
# engine.py
import json
from anomaly_detector import detect_anomaly
from prototype_matcher import match_prototype
from baseline_screener import screen_baseline

def run_analysis(input_json_string):
    data = json.loads(input_json_string)
    
    # Stage 1
    anomaly_result = detect_anomaly(data)
    
    # Stage 2 (only if anomaly detected)
    if anomaly_result["detected"]:
        match_result = match_prototype(data)
    else:
        match_result = {"match": "None", "message": "No anomaly to interpret"}
    
    return json.dumps({
        "anomaly": anomaly_result,
        "prototype": match_result
    })
```

