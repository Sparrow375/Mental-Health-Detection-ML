## вҸ° NIGHTLY PROCESSING PIPELINE

### Using Android WorkManager

```kotlin
// Schedule nightly analysis
val nightlyWork = PeriodicWorkRequestBuilder<NightlyAnalysisWorker>(
    1, TimeUnit.DAYS
)
.setInitialDelay(calculateDelayUntilMidnight(), TimeUnit.MILLISECONDS)
.setConstraints(
    Constraints.Builder()
        .setRequiresBatteryNotLow(true)
        .build()
)
.build()

WorkManager.getInstance(context)
    .enqueueUniquePeriodicWork(
        "nightly_analysis",
        ExistingPeriodicWorkPolicy.KEEP,
        nightlyWork
    )
```

### Nightly Worker Flow

```
NightlyAnalysisWorker:
в”Ӯ
в”ңв”Җв”Җ 1. Query SQLite for today's 18 features
в”Ӯ
в”ңв”Җв”Җ 2. Check: Is baseline ready? (28 days collected?)
в”Ӯ     в”ңв”Җв”Җ NO  вҶ’ Store data, skip analysis, return
в”Ӯ     в””в”Җв”Җ YES вҶ’ Continue
в”Ӯ
в”ңв”Җв”Җ 3. Build JSON input from SQLite data
в”Ӯ
в”ңв”Җв”Җ 4. Call Python engine via Chaquopy
в”Ӯ
в”ңв”Җв”Җ 5. Receive result string
в”Ӯ
в”ңв”Җв”Җ 6. Parse and store in analysis_results table
в”Ӯ
в”ңв”Җв”Җ 7. Update user_profile status if needed
в”Ӯ
в”ңв”Җв”Җ 8. Trigger CloudSyncWorker
в”Ӯ     в”ңв”Җв”Җ Check internet availability
в”Ӯ     в”ңв”Җв”Җ YES вҶ’ Sync unsynced data to Firebase
в”Ӯ     в””в”Җв”Җ NO  вҶ’ Mark for later sync
в”Ӯ
в””в”Җв”Җ 9. If anomaly вҶ’ Update UI state for user
```

