## рҹ”„ CLOUD SYNC STRATEGY

```kotlin
class CloudSyncWorker : CoroutineWorker() {

    override suspend fun doWork(): Result {
        
        // 1. Get all unsynced daily_features
        val unsyncedFeatures = db.dailyFeaturesDao()
            .getUnsynced()
        
        // 2. Get all unsynced analysis_results
        val unsyncedResults = db.analysisResultsDao()
            .getUnsynced()
        
        // 3. Upload to Firebase
        unsyncedFeatures.forEach { feature ->
            firestore
                .collection("users")
                .document(feature.userId)
                .collection("daily_data")
                .document(feature.date)
                .set(feature.toMap())
                .await()
            
            // Mark as synced locally
            db.dailyFeaturesDao().markSynced(feature.id)
        }
        
        // Same for results...
        
        return Result.success()
    }
}

// Trigger with network constraint
val syncWork = OneTimeWorkRequestBuilder<CloudSyncWorker>()
    .setConstraints(
        Constraints.Builder()
            .setRequiredNetworkType(NetworkType.CONNECTED)
            .build()
    )
    .build()
```

