## рҹ”§ TECHNOLOGY STACK

| Component | Technology | Why |
|-----------|-----------|-----|
| Android App UI | **Kotlin** | Already built |
| Python on Android | **Chaquopy** | Best for Kotlin вҶ” Python interop, no need to rewrite logic |
| Local Database | **SQLite (Room)** | Native Android, reliable, structured |
| Local JSON Store | **JSON files** | For Python engine input/output compatibility |
| Cloud Database | **Firebase Firestore** | Real-time sync, easy setup, scales for 20 users |
| Cloud Auth | **Firebase Auth** | Admin login for dashboard |
| Data Sync | **Firebase SDK** | Built-in offline/online sync |
| Admin Dashboard | **React + Firebase** | Fast to build, real-time data |
| Encryption in Transit | **HTTPS/TLS** | Firebase default |
| Nightly Scheduler | **Android WorkManager** | Reliable background task scheduling |

