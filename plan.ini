## рҹҗҚ THE EDGE-ML PIPELINE (ENGINE.PY)

The nightly worker relies on a sophisticated 3-stage python orchestration:

1. **Level 2 Behavioral DNA (`dna.py`, `dna_engine.py`)**  
   Dynamically learns healthy cluster behaviors (Workday, Weekend). Generates an `l2_modifier` based on App Session *Texture Quality* and *Rhythm Integrity*.

2. **System 1 Anomaly Detector (`system1.py`)**  
   Evaluates 29 features using *Weighted Z-Score Magnitude* + *EWMA Velocity*. If anomalous, snowballs exponentially via the `Evidence Accumulator` (multiplied by the DNA `l2_modifier`).

3. **System 2 Diagnostic Pipeline (`pipeline.py`)**  
   Passes System 1 output through a 6-phase pipeline:
   * Phase 1: Baseline Contamination Check
   * Phase 2: Life Event Filter
   * Phase 3: Distance Prototype Matcher
   * Phase 4: Clinical Guardrails (Psychosis/Withdrawal Overrides)
   * Phase 5: Temporal Validator
   * Phase 6: Explainability Engine

